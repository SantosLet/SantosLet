name: Waka Readme

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          GH_TOKEN: ${{ secrets.WAKA_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # --- Desabilitar o gráfico de linha do tempo (seu caso) ---
          SHOW_LOC_CHART: "False"
          # --- Outras flags que mencionamos ---
          SHOW_TOTAL_CODE_TIME: "False" # Desabilita o badge "Code Time"
          SHOW_LINES_OF_CODE: "False"   # Desabilita o total de linhas de código
          SHOW_LANGUAGE: "True"         # Reativa as linguagens
          SHOW_EDITORS: "True"          # Reativa os editores
          SHOW_OS: "True"               # Reativa o SO
          SHOW_PROJECTS: "True"         # Reativa os projetos
